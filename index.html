<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    video {
      display: block !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      pointer-events: none !important;
    }

    #start-btn {
      position: fixed !important;
      z-index: 9999 !important;
      top: 40% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      padding: 15px 25px !important;
      font-size: 18px !important;
      background: #00c853 !important;
      color: white !important;
      border: none !important;
      border-radius: 10px !important;
      cursor: pointer !important;
      pointer-events: auto !important;
    }
  </style>
</head>
<body>

  <button id="start-btn">Start AR 🚀</button>

  <a-scene
    embedded
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    renderer="antialias: true; alpha: true"
    id="scene"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-text
        value="WORKING ✅"
        color="yellow"
        position="0 0 0.3"
        width="3">
      </a-text>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const scene = document.querySelector("#scene");
      const btn = document.querySelector("#start-btn");

      scene.addEventListener("arReady", () => console.log("AR Ready ✅"));
      scene.addEventListener("arError", () => alert("Camera failed to start. Check permissions."));

      btn.addEventListener("click", async () => {
        if (!scene.hasLoaded) {
          await new Promise(resolve => scene.addEventListener("loaded", resolve, { once: true }));
        }

        const mindarSystem = scene.systems["mindar-image-system"];
        if (!mindarSystem) {
          alert("MindAR system not found.");
          return;
        }

        try {
          await mindarSystem.start();
          btn.style.display = "none";
          console.log("Camera started ✅");
        } catch (err) {
          alert("Camera failed ❌: " + err);
        }
      });
    });
  </script>

</body>
</html>
